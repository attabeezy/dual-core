# WAXAL-Dual-Core Training Variant Configurations
#
# Each variant defines one or more training stages executed sequentially.
# The same model is carried forward between stages (no re-initialisation).
#
# Fields per stage:
#   name:          Identifier for checkpoint subdirectory
#   data_split:    asr | tts | mixed
#   learning_rate: AdamW LR for this stage
#   epochs:        Number of training epochs
#   batch_size:    Per-device batch size (gradient_accumulation_steps=4)
#   max_length:    Tokenizer truncation length

model:
  base_id: meta-llama/Llama-3.2-1B
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    bias: none
    target_modules: [q_proj, k_proj, v_proj, o_proj]

variants:
  control:
    description: "Baseline — no fine-tuning, use base model directly"
    stages: []

  A:
    description: "ASR only — pure robustness to conversational noise"
    stages:
      - name: asr_only
        data_split: asr
        learning_rate: 2e-4
        epochs: 3
        batch_size: 4
        max_length: 512

  B:
    description: "TTS only — maximum semantic density and logic"
    stages:
      - name: tts_only
        data_split: tts
        learning_rate: 2e-4
        epochs: 3
        batch_size: 4
        max_length: 512

  C:
    description: "ASR + TTS mixed — standard joint-distribution training"
    stages:
      - name: mixed
        data_split: mixed
        learning_rate: 2e-4
        epochs: 3
        batch_size: 4
        max_length: 512

  D:
    description: "TTS → ASR → TTS — primary hypothesis: anchor logic, adapt to noise, refine logic"
    stages:
      - name: tts_stage1
        data_split: tts
        learning_rate: 2e-4
        epochs: 2
        batch_size: 4
        max_length: 512
      - name: asr_stage2
        data_split: asr
        learning_rate: 1e-4
        epochs: 1
        batch_size: 4
        max_length: 512
      - name: tts_stage3
        data_split: tts
        learning_rate: 5e-5
        epochs: 1
        batch_size: 4
        max_length: 512

  E:
    description: "ASR → TTS — test if phonetic grounding aids later reasoning"
    stages:
      - name: asr_stage1
        data_split: asr
        learning_rate: 2e-4
        epochs: 2
        batch_size: 4
        max_length: 512
      - name: tts_stage2
        data_split: tts
        learning_rate: 1e-4
        epochs: 1
        batch_size: 4
        max_length: 512
